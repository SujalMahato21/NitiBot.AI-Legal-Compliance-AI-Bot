<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NitiBot – AI Legal Compliance</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Space+Mono:wght@400;700&family=Outfit:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #0b0e14;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 60px;
    padding: 60px 24px;
    font-family: 'Outfit', sans-serif;
  }

  /* ── Background grid texture ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(180,150,80,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(180,150,80,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .section-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.4em;
    color: #4a4535;
    text-transform: uppercase;
    text-align: center;
  }

  /* ════════════════════════════════
     PRIMARY LOGO (Dark bg)
  ════════════════════════════════ */
  .primary-card {
    background: #0f1219;
    border: 1px solid #1e2330;
    border-radius: 8px;
    padding: 64px 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    position: relative;
    overflow: hidden;
  }
  .primary-card::before {
    content: '';
    position: absolute;
    top: 0; left: 10%; right: 10%;
    height: 1px;
    background: linear-gradient(90deg, transparent, #c9a855, transparent);
  }
  .primary-card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 60% 40% at 50% 0%, rgba(201,168,85,0.05), transparent);
    pointer-events: none;
  }

  .logo-lockup {
    display: flex;
    align-items: center;
    gap: 26px;
  }

  /* Icon */
  .icon-wrap {
    position: relative;
    width: 72px;
    height: 72px;
  }
  .icon-pulse {
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    border: 1px solid rgba(201,168,85,0.2);
    animation: pulse 2.8s ease-in-out infinite;
  }
  .icon-pulse-2 {
    position: absolute;
    inset: -18px;
    border-radius: 50%;
    border: 1px solid rgba(201,168,85,0.08);
    animation: pulse 2.8s ease-in-out 0.9s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.5; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.04); }
  }

  /* Wordmark */
  .wordmark {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .wordmark-top {
    display: flex;
    align-items: baseline;
    gap: 6px;
  }
  .w-niti {
    font-family: 'Cormorant Garamond', serif;
    font-size: 52px;
    font-weight: 700;
    color: #f0e6cc;
    letter-spacing: -0.5px;
    line-height: 1;
  }
  .w-bot {
    font-family: 'Space Mono', monospace;
    font-size: 16px;
    font-weight: 700;
    color: #c9a855;
    letter-spacing: 0.12em;
    margin-bottom: 5px;
  }
  .divider-line {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, #c9a855, rgba(201,168,85,0.2));
  }
  .tagline {
    font-family: 'Space Mono', monospace;
    font-size: 8.5px;
    letter-spacing: 0.32em;
    color: #7a6e58;
    text-transform: uppercase;
  }

  /* ── Variants row ── */
  .variants {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    justify-content: center;
  }

  /* Light variant */
  .variant-card {
    border-radius: 8px;
    padding: 40px 48px;
    display: flex;
    align-items: center;
    gap: 18px;
    border: 1px solid #e0d5c0;
    position: relative;
    overflow: hidden;
  }
  .variant-light {
    background: #faf7f1;
  }
  .variant-dark {
    background: #1a2236;
    border-color: #263045;
  }

  .v-wordmark { display: flex; flex-direction: column; gap: 3px; }
  .v-top { display: flex; align-items: baseline; gap: 4px; }

  .v-niti-light {
    font-family: 'Cormorant Garamond', serif;
    font-size: 36px; font-weight: 700;
    color: #1a1510; letter-spacing: -0.3px; line-height: 1;
  }
  .v-bot-light {
    font-family: 'Space Mono', monospace;
    font-size: 11px; font-weight: 700;
    color: #b8922a; letter-spacing: 0.1em; margin-bottom: 3px;
  }
  .v-tag-light {
    font-family: 'Space Mono', monospace;
    font-size: 7px; letter-spacing: 0.28em;
    color: #a09070; text-transform: uppercase;
  }

  .v-niti-dark {
    font-family: 'Cormorant Garamond', serif;
    font-size: 36px; font-weight: 700;
    color: #e8dcc8; letter-spacing: -0.3px; line-height: 1;
  }
  .v-bot-dark {
    font-family: 'Space Mono', monospace;
    font-size: 11px; font-weight: 700;
    color: #c9a855; letter-spacing: 0.1em; margin-bottom: 3px;
  }
  .v-tag-dark {
    font-family: 'Space Mono', monospace;
    font-size: 7px; letter-spacing: 0.28em;
    color: #5a6070; text-transform: uppercase;
  }

  /* Icon mini for variants */
  .icon-mini { width: 44px; height: 44px; }

  /* Standalone icon card */
  .icon-only-card {
    background: #0f1219;
    border: 1px solid #1e2330;
    border-radius: 8px;
    padding: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .icon-only-card::before {
    content: '';
    position: absolute;
    top: 0; left: 10%; right: 10%;
    height: 1px;
    background: linear-gradient(90deg, transparent, #c9a855, transparent);
  }

  .bottom-row {
    display: flex;
    gap: 24px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
  }

</style>
</head>
<body>

<!-- ══ PRIMARY LOGO ══ -->
<div class="section-label">Primary Logo — Dark</div>
<div class="primary-card">
  <div class="logo-lockup">

    <!-- ICON: Shield + Circuit + Scales hybrid -->
    <div class="icon-wrap">
      <div class="icon-pulse"></div>
      <div class="icon-pulse-2"></div>
      <svg width="72" height="72" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Shield -->
        <path d="M36 4 L62 16 L62 40 C62 56 36 68 36 68 C36 68 10 56 10 40 L10 16 Z"
          fill="#0f1219" stroke="#c9a855" stroke-width="1.4"/>
        <!-- Inner shield border -->
        <path d="M36 11 L56 21 L56 39 C56 52 36 62 36 62 C36 62 16 52 16 39 L16 21 Z"
          fill="none" stroke="#c9a855" stroke-width="0.6" opacity="0.35"/>

        <!-- Scales beam -->
        <line x1="22" y1="34" x2="50" y2="34" stroke="#c9a855" stroke-width="1.2" stroke-linecap="round"/>
        <!-- Pole -->
        <line x1="36" y1="22" x2="36" y2="54" stroke="#c9a855" stroke-width="1.2" stroke-linecap="round"/>
        <!-- Top pin -->
        <circle cx="36" cy="23" r="2.5" fill="#c9a855"/>
        <!-- Left pan chain -->
        <line x1="24" y1="34" x2="22" y2="42" stroke="#c9a855" stroke-width="0.9" stroke-dasharray="2 1.5"/>
        <path d="M17 42 Q22 47 27 42" stroke="#c9a855" stroke-width="1.1" fill="none" stroke-linecap="round"/>
        <!-- Right pan chain -->
        <line x1="48" y1="34" x2="50" y2="42" stroke="#c9a855" stroke-width="0.9" stroke-dasharray="2 1.5"/>
        <path d="M45 42 Q50 47 55 42" stroke="#c9a855" stroke-width="1.1" fill="none" stroke-linecap="round"/>
        <!-- Base -->
        <rect x="30" y="52" width="12" height="2" rx="1" fill="#c9a855" opacity="0.6"/>

        <!-- Circuit nodes (AI element) -->
        <circle cx="22" cy="26" r="2" fill="#4a7fb5" opacity="0.9"/>
        <circle cx="50" cy="26" r="2" fill="#4a7fb5" opacity="0.9"/>
        <line x1="24" y1="26" x2="34" y2="26" stroke="#4a7fb5" stroke-width="0.8" opacity="0.6"/>
        <line x1="38" y1="26" x2="48" y2="26" stroke="#4a7fb5" stroke-width="0.8" opacity="0.6"/>
        <circle cx="36" cy="26" r="1.4" fill="#4a7fb5" opacity="0.8"/>

        <!-- Checkmark tick (compliance) -->
        <polyline points="29,36 33,40 43,30" stroke="#c9a855" stroke-width="1.4"
          fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0"/>
      </svg>
    </div>

    <!-- WORDMARK -->
    <div class="wordmark">
      <div class="wordmark-top">
        <span class="w-niti">Niti</span>
        <span class="w-bot">BOT</span>
      </div>
      <div class="divider-line"></div>
      <div class="tagline">AI · Legal Compliance</div>
    </div>
  </div>
</div>

      <rect x="30" y="52" width="12" height="2" rx="1" fill="#b8922a" opacity="0.6"/>
      <circle cx="22" cy="26" r="2" fill="#2d6a9f" opacity="0.8"/>

      <circle cx="36" cy="26" r="1.4" fill="#2d6a9f" opacity="0.7"/>

      <path d="M36 4 L62 16 L62 40 C62 56 36 68 36 68 C36 68 10 56 10 40 L10 16 Z"

      <path d="M36 11 L56 21 L56 39 C56 52 36 62 36 62 C36 62 16 52 16 39 L16 21 Z"

      <path d="M45 42 Q50 47 55 42" stroke="#c9a855" stroke-width="1.1" fill="none" stroke-linecap="round"/>
      <rect x="30" y="52" width="12" height="2" rx="1" fill="#c9a855" opacity="0.6"/>
      <circle cx="22" cy="26" r="2" fill="#4a7fb5" opacity="0.9"/>
      <circle cx="50" cy="26" r="2" fill="#4a7fb5" opacity="0.9"/>
      <line x1="24" y1="26" x2="34" y2="26" stroke="#4a7fb5" stroke-width="0.8" opacity="0.6"/>
      <line x1="38" y1="26" x2="48" y2="26" stroke="#4a7fb5" stroke-width="0.8" opacity="0.6"/>
      <circle cx="36" cy="26" r="1.4" fill="#4a7fb5" opacity="0.8"/>
    </svg>
    <div class="v-wordmark">
      <div class="v-top">
        <span class="v-niti-dark">Niti</span>
        <span class="v-bot-dark">BOT</span>
      </div>
      <div class="v-tag-dark">AI · Legal Compliance</div>
    </div>
  </div>

</div>

<!-- ══ ICON ONLY ══ -->
<div class="section-label">Icon Mark</div>
<div class="bottom-row">
  <div class="icon-only-card">
    <svg width="80" height="80" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M36 4 L62 16 L62 40 C62 56 36 68 36 68 C36 68 10 56 10 40 L10 16 Z"

      <path d="M36 11 L56 21 L56 39 C56 52 36 62 36 62 C36 62 16 52 16 39 L16 21 Z"

</div>

</body>
